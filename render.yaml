services:
  - type: web
    name: signalx-api
    runtime: python
    rootDir: backend
    pythonVersion: "3.12.0"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./signalx.db
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MAX_UPLOAD_SIZE_BYTES
        value: "26214400"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
